name: Send Weekly Newsletter

# Manual-only sender. Reads whatever is in newsletters/outbox/, broadcasts
# via Resend, moves the file to newsletters/sent/, commits, and rebuilds
# the site so /briefings picks up the new archive entry.
#
# This workflow does NOT draft. Use the "Draft Weekly Newsletter" workflow
# (scheduled Wednesday 18:00 UTC) to generate a draft first, review the
# committed file in newsletters/outbox/, then trigger this workflow.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Confirm outbox has a draft
        run: |
          shopt -s nullglob
          files=(newsletters/outbox/*.md newsletters/outbox/*.html)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No files in newsletters/outbox/. Run the Draft workflow first."
            exit 1
          fi
          echo "Found ${#files[@]} file(s) in outbox:"
          printf '  %s\n' "${files[@]}"

      - name: Send via Resend
        run: npm run send:newsletter
        env:
          RESEND_API_KEY:      ${{ secrets.RESEND_API_KEY }}
          RESEND_SEGMENT_ID:   ${{ secrets.RESEND_SEGMENT_ID }}
          RESEND_TOPIC_ID:     ${{ secrets.RESEND_TOPIC_ID }}
          RESEND_FROM_ADDRESS: ${{ secrets.RESEND_FROM_ADDRESS }}

      - name: Commit sent newsletter to archive
        run: |
          git config user.name "AmericasOilWatch Bot"
          git config user.email "bot@americasoilwatch.com"
          git add newsletters/
          git diff --staged --quiet || git commit -m "chore: weekly briefing sent $(date +%Y-%m-%d)"
          git push

      - name: Trigger Netlify rebuild
        run: curl -s -X POST ${{ secrets.NETLIFY_BUILD_HOOK }}
