name: Send Newsletter

# Matches the EuroOilWatch / UKOilWatch pattern:
# push a file into newsletters/outbox/ and this workflow sends it.
#
# Local flow:
#   1. npm run draft:newsletter        # writes draft to newsletters/outbox/
#   2. review/edit the file
#   3. git add newsletters/outbox && git commit -m "newsletter: ..." && git push
#   4. push triggers this workflow → broadcasts via Resend →
#      moves file to newsletters/sent/ → triggers Netlify rebuild so
#      /briefings archive picks it up

on:
  push:
    paths:
      - 'newsletters/outbox/*.html'
      - 'newsletters/outbox/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send newsletter via Resend
        run: npm run send:newsletter
        env:
          RESEND_API_KEY:      ${{ secrets.RESEND_API_KEY }}
          RESEND_SEGMENT_ID:   ${{ secrets.RESEND_SEGMENT_ID }}
          RESEND_TOPIC_ID:     ${{ secrets.RESEND_TOPIC_ID }}
          RESEND_FROM_ADDRESS: ${{ secrets.RESEND_FROM_ADDRESS }}

      - name: Commit sent newsletter to archive
        run: |
          git config user.name "AmericasOilWatch Bot"
          git config user.email "bot@americasoilwatch.com"
          git add newsletters/
          git diff --staged --quiet || git commit -m "chore: newsletter sent $(date +%Y-%m-%d)"
          git pull --rebase origin ${{ github.ref_name }}
          git push

      - name: Trigger Netlify rebuild
        run: curl -s -X POST ${{ secrets.NETLIFY_BUILD_HOOK }}
