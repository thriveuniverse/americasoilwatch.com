name: Draft Weekly Newsletter

# Scheduled drafter — runs every Wednesday, writes a draft to
# newsletters/outbox/ and commits it. Jon reviews, edits if needed,
# then manually runs the "Send Weekly Newsletter" workflow to broadcast.
#
# This workflow does NOT send email. No RESEND_* secrets needed.

on:
  schedule:
    # Wednesday 18:00 UTC — 1 hour after the data-update workflow runs post-EIA release
    - cron: '0 18 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate newsletter draft
        run: npm run draft:newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit draft to outbox
        run: |
          git config user.name "AmericasOilWatch Bot"
          git config user.email "bot@americasoilwatch.com"
          git add newsletters/outbox/
          if git diff --staged --quiet; then
            echo "No draft generated — nothing to commit."
          else
            git commit -m "📝 weekly briefing draft — $(date +%Y-%m-%d) — REVIEW BEFORE SENDING"
            git push
            echo "::notice::Draft committed. Review newsletters/outbox/ and run 'Send Weekly Newsletter' manually to broadcast."
          fi
