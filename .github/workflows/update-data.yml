name: Update Data Pipeline

on:
  schedule:
    # Times are staggered OFF the top of the hour: GitHub drops/delays far fewer
    # off-:00 scheduled runs. Three daily runs (was one) give redundancy — if
    # GitHub skips one, a later one catches it the same day. The evening run also
    # covers the EIA weekly stocks release (Wed ~10:30 ET).
    - cron: '7 6 * * *'    # 06:07 UTC — morning
    - cron: '23 12 * * *'  # 12:23 UTC — midday redundancy (catches a dropped morning run)
    - cron: '43 17 * * *'  # 17:43 UTC — evening (new 2nd/3rd daily run)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch WTI price (Yahoo Finance fallback)
        run: npm run fetch:wti
        continue-on-error: true

      - name: Fetch EIA detailed data (US stocks, retail prices)
        run: npm run fetch:eia
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        continue-on-error: true

      - name: Fetch US 3-2-1 crack spread (refining margin)
        run: npm run fetch:crack
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        continue-on-error: true

      - name: Fetch Dow–Nasdaq divergence (FRED)
        run: npm run fetch:divergence
        continue-on-error: true

      - name: Fetch Brent crude price
        run: npm run fetch:brent
        continue-on-error: true

      - name: Fetch EIA Brent daily history (1987→today)
        run: npm run fetch:brent-eia
        continue-on-error: true

      - name: Fetch sea-state at shipping chokepoints
        run: npm run fetch:sea-state
        continue-on-error: true

      - name: Fetch OPEC+ production (EIA international data)
        run: npm run fetch:opec
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        continue-on-error: true

      - name: Fetch bunker fuel prices
        run: npm run fetch:bunker
        continue-on-error: true

      - name: Fetch MARAD maritime advisories
        run: npm run fetch:marad
        continue-on-error: true

      - name: Fetch CENTCOM advisories (Middle East maritime)
        run: npm run fetch:centcom
        continue-on-error: true

      - name: Fetch CREA energy research feed
        run: npm run fetch:crea
        continue-on-error: true

      - name: Fetch IMF PortWatch chokepoint transit data
        run: npm run fetch:portwatch
        continue-on-error: true

      - name: Fetch IMF PortWatch port oil-flow data
        run: npm run fetch:port-flows
        continue-on-error: true

      - name: Fetch news feeds (OilPrice, Rigzone, Offshore Technology)
        run: npm run fetch:news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Generate AI analysis
        run: npm run analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "AmericasOilWatch Bot"
          git config user.email "bot@americasoilwatch.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "chore: update data $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Trigger Netlify rebuild
        run: curl -s -X POST ${{ secrets.NETLIFY_BUILD_HOOK }}
