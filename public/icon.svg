<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a1f3b"/>
  <!-- Barrel body -->
  <rect x="11" y="11" width="10" height="13" rx="1" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
  <!-- Barrel top ellipse -->
  <ellipse cx="16" cy="11" rx="5" ry="2" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
  <!-- Barrel bottom ellipse -->
  <ellipse cx="16" cy="24" rx="5" ry="2" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
  <!-- Barrel rings -->
  <line x1="11" y1="15.5" x2="21" y2="15.5" stroke="#60a5fa" stroke-width="0.8"/>
  <line x1="11" y1="19.5" x2="21" y2="19.5" stroke="#60a5fa" stroke-width="0.8"/>
  <!-- AM label -->
  <text x="16" y="8.5" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">AM</text>
</svg>
